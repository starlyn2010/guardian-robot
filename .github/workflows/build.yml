name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Android SDK
        run: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.6

      - name: Download TFLite model
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/efficientdet_lite0.tflite \
            "https://storage.googleapis.com/download.tensorflow.org/models/tflite/task_library/object_detection/rpi/lite-model_efficientdet_lite0_detection_metadata_1.tflite"

      - name: Build
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GuardianRobot-APK
          path: app/build/outputs/apk/debug/app-debug.apk
